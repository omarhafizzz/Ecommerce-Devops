apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: ecommerce
  labels:
    app: ecommerce
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # لو بتستخدم SSL uncommit الـ annotations دي
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx   # تأكد إن nginx ingress controller متثبت
  rules:
    - host: ecommerce.local   # غيره لـ domain بتاعك
      http:
        paths:
          # كل requests الـ API تروح للـ backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          # كل requests التانية تروح للـ frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
  # لو عندك SSL uncommit الجزء ده
  # tls:
  #   - hosts:
  #       - ecommerce.local
  #     secretName: ecommerce-tls
